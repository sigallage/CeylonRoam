<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="480" fill="#f8fafc" rx="12"/>
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">OIDC-Based AWS Authentication (No Static Keys)</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="30" y="60" width="200" height="90" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="130" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#6b21a8">① GitHub Actions Runner</text>
  <text x="130" y="100" text-anchor="middle" font-size="11" fill="#6b21a8">Workflow triggered by</text>
  <text x="130" y="116" text-anchor="middle" font-size="11" fill="#6b21a8">push to main branch</text>
  <text x="130" y="132" text-anchor="middle" font-size="11" fill="#6b21a8">ubuntu-latest runner</text>

  <!-- Arrow 1 → 2 -->
  <line x1="230" y1="105" x2="275" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="248" y="98" text-anchor="middle" font-size="10" fill="#555">JWT</text>

  <!-- Step 2 -->
  <rect x="277" y="60" width="200" height="90" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="377" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">② GitHub OIDC Provider</text>
  <text x="377" y="100" text-anchor="middle" font-size="11" fill="#854d0e">Issues short-lived</text>
  <text x="377" y="116" text-anchor="middle" font-size="11" fill="#854d0e">OIDC token (JWT)</text>
  <text x="377" y="132" text-anchor="middle" font-size="11" fill="#854d0e">token.actions.github.com</text>

  <!-- Arrow 2 → 3 -->
  <line x1="477" y1="105" x2="523" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="500" y="98" text-anchor="middle" font-size="10" fill="#555">AssumeRole</text>

  <!-- Step 3 -->
  <rect x="525" y="60" width="200" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="625" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">③ AWS STS</text>
  <text x="625" y="100" text-anchor="middle" font-size="11" fill="#14532d">Validates token against</text>
  <text x="625" y="116" text-anchor="middle" font-size="11" fill="#14532d">IAM role trust policy</text>
  <text x="625" y="132" text-anchor="middle" font-size="11" fill="#14532d">Returns temp credentials</text>

  <!-- Arrow down from STS -->
  <line x1="625" y1="150" x2="625" y2="195" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="635" y="180" font-size="10" fill="#555">temp creds</text>

  <!-- AWS Services accessed -->
  <rect x="430" y="198" width="380" height="80" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="620" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#075985">④ AWS Services</text>
  <text x="620" y="238" text-anchor="middle" font-size="11" fill="#075985">ECR (push images)  ·  ECS (update-service)</text>
  <text x="620" y="255" text-anchor="middle" font-size="11" fill="#075985">Role scoped to minimum required permissions</text>

  <!-- Workflow YAML snippet -->
  <rect x="30" y="180" width="380" height="130" rx="8" fill="#0d1117"/>
  <text x="46" y="200" font-size="11" fill="#8b949e" font-family="Consolas, monospace">- name: Configure AWS credentials (OIDC)</text>
  <text x="46" y="218" font-size="11" fill="#79c0ff" font-family="Consolas, monospace">  uses: aws-actions/configure-aws-credentials@v4</text>
  <text x="46" y="236" font-size="11" fill="#e6edf3" font-family="Consolas, monospace">  with:</text>
  <text x="46" y="254" font-size="11" fill="#e6edf3" font-family="Consolas, monospace">    aws-region: </text>
  <text x="168" y="254" font-size="11" fill="#a5d6ff" font-family="Consolas, monospace">&#36;&#123;&#123; env.AWS_REGION &#125;&#125;</text>
  <text x="46" y="272" font-size="11" fill="#e6edf3" font-family="Consolas, monospace">    role-to-assume: </text>
  <text x="182" y="272" font-size="11" fill="#f0883e" font-family="Consolas, monospace">&#36;&#123;&#123; secrets.AWS_ROLE_TO_ASSUME &#125;&#125;</text>
  <text x="46" y="295" font-size="11" fill="#8b949e" font-family="Consolas, monospace"># id-token: write permission required (see line 13)</text>

  <!-- Secrets box -->
  <rect x="30" y="328" width="756" height="130" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="46" y="350" font-size="13" font-weight="700" fill="#9a3412">Repository Secret Required</text>
  <text x="46" y="370" font-size="12" fill="#7c2d12">Name: <tspan font-family="Consolas, monospace" fill="#ea580c">AWS_ROLE_TO_ASSUME</tspan></text>
  <text x="46" y="390" font-size="12" fill="#7c2d12">Value: ARN of the IAM role (e.g. <tspan font-family="Consolas, monospace">arn:aws:iam::123456789012:role/ceylonroam-github-deploy</tspan>)</text>
  <text x="46" y="410" font-size="12" fill="#7c2d12">Set at: GitHub repo → Settings → Secrets and variables → Actions → New repository secret</text>
  <text x="46" y="432" font-size="12" font-weight="600" fill="#9a3412">✓ Justification: No long-lived AWS access keys stored in GitHub. Credentials expire after each workflow run.</text>
  <text x="46" y="450" font-size="12" fill="#9a3412">The IAM trust policy grants access only to the specific repo+branch, preventing misuse from forks.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>