<svg xmlns="http://www.w3.org/2000/svg" width="820" height="420" font-family="Segoe UI, Arial, sans-serif">
  <rect width="820" height="420" fill="#f8fafc" rx="12"/>
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">AWS Secrets Manager – CeylonRoam Secrets</text>
  <text x="410" y="54" text-anchor="middle" font-size="12" fill="#64748b">Secrets are injected into ECS containers at runtime — never stored in source code or Docker images</text>

  <!-- Column headers -->
  <rect x="30" y="66" width="250" height="30" rx="4" fill="#92400e"/>
  <text x="155" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">Secret Name</text>
  <rect x="290" y="66" width="230" height="30" rx="4" fill="#92400e"/>
  <text x="405" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">Used By Service(s)</text>
  <rect x="530" y="66" width="256" height="30" rx="4" fill="#92400e"/>
  <text x="658" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="white">Environment Variable</text>

  <!-- Rows -->
  <rect x="30" y="102" width="756" height="36" rx="4" fill="#fff7ed"/>
  <text x="40" y="125" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/mongodb_uri</text>
  <text x="295" y="125" font-size="12" fill="#374151">auth-service</text>
  <text x="535" y="125" font-size="12" font-family="Consolas, monospace" fill="#374151">MONGODB_URI</text>

  <rect x="30" y="144" width="756" height="36" rx="4" fill="#fef3c7"/>
  <text x="40" y="167" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/jwt_secret</text>
  <text x="295" y="167" font-size="12" fill="#374151">auth-service</text>
  <text x="535" y="167" font-size="12" font-family="Consolas, monospace" fill="#374151">JWT_SECRET</text>

  <rect x="30" y="186" width="756" height="36" rx="4" fill="#fff7ed"/>
  <text x="40" y="209" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/session_secret</text>
  <text x="295" y="209" font-size="12" fill="#374151">auth-service</text>
  <text x="535" y="209" font-size="12" font-family="Consolas, monospace" fill="#374151">SESSION_SECRET</text>

  <rect x="30" y="228" width="756" height="36" rx="4" fill="#fef3c7"/>
  <text x="40" y="251" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/google_maps_api_key</text>
  <text x="295" y="251" font-size="12" fill="#374151">auth, itinerary, route-optimizer</text>
  <text x="535" y="251" font-size="12" font-family="Consolas, monospace" fill="#374151">GOOGLE_MAPS_API_KEY</text>

  <rect x="30" y="270" width="756" height="36" rx="4" fill="#fff7ed"/>
  <text x="40" y="293" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/openrouter_api_key</text>
  <text x="295" y="293" font-size="12" fill="#374151">itinerary-service</text>
  <text x="535" y="293" font-size="12" font-family="Consolas, monospace" fill="#374151">OPENROUTER_API_KEY</text>

  <rect x="30" y="312" width="756" height="36" rx="4" fill="#fef3c7"/>
  <text x="40" y="335" font-size="12" font-family="Consolas, monospace" fill="#92400e">ceylonroam/email_user · ceylonroam/email_password</text>
  <text x="295" y="335" font-size="12" fill="#374151">auth-service (email OTP)</text>
  <text x="535" y="335" font-size="12" font-family="Consolas, monospace" fill="#374151">EMAIL_USER · EMAIL_PASSWORD</text>

  <!-- Justification -->
  <rect x="30" y="360" width="756" height="46" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="46" y="380" font-size="13" font-weight="700" fill="#9a3412">✓ Why Secrets Manager?</text>
  <text x="46" y="398" font-size="12" fill="#9a3412">Secrets are resolved to their ARNs by deploy.sh and injected at container launch via ECS task definition "secrets" field. No credentials appear in source code, Docker images, or CI logs.</text>
</svg>