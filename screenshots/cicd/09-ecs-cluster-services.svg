  <!-- Justification -->
  <rect x="30" y="328" width="756" height="95" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="46" y="348" font-size="13" font-weight="700" fill="#065f46">✓ Why ECS Fargate?</text>
  <text x="46" y="368" font-size="12" fill="#065f46">• Serverless containers: no EC2 instances to patch or manage. AWS handles capacity, networking, and scaling.</text>
  <text x="46" y="385" font-size="12" fill="#065f46">• Each service runs in its own task: independent CPU/memory allocation, restart policies, and scaling rules.</text>
  <text x="46" y="402" font-size="12" fill="#065f46">• Services created with create-ecs-services.ps1 (one-time) then managed by CI/CD (force-new-deployment).</text>
  <text x="46" y="419" font-size="12" fill="#065f46">• N in task definition revision indicates latest registered revision — automatically incremented each deploy.</text>
</svg>