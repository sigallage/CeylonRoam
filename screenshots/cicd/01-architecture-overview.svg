<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#f8fafc" rx="12"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">CeylonRoam – Deployment Architecture Overview</text>

  <!-- Developer -->
  <rect x="30" y="80" width="120" height="60" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="90" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#1e40af">Developer</text>
  <text x="90" y="123" text-anchor="middle" font-size="11" fill="#1e40af">git push main</text>

  <!-- GitHub -->
  <rect x="210" y="80" width="120" height="60" rx="8" fill="#f3e8ff" stroke="#9333ea" stroke-width="2"/>
  <text x="270" y="105" text-anchor="middle" font-size="13" font-weight="600" fill="#6b21a8">GitHub</text>
  <text x="270" y="123" text-anchor="middle" font-size="11" fill="#6b21a8">Source Control</text>

  <!-- GitHub Actions -->
  <rect x="390" y="80" width="150" height="60" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="465" y="102" text-anchor="middle" font-size="13" font-weight="600" fill="#854d0e">GitHub Actions</text>
  <text x="465" y="118" text-anchor="middle" font-size="11" fill="#854d0e">CI/CD Workflow</text>
  <text x="465" y="133" text-anchor="middle" font-size="10" fill="#854d0e">deploy-backend-ecs.yml</text>

  <!-- ECR -->
  <rect x="600" y="60" width="130" height="60" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="665" y="85" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Amazon ECR</text>
  <text x="665" y="101" text-anchor="middle" font-size="11" fill="#14532d">Container Registry</text>
  <text x="665" y="114" text-anchor="middle" font-size="10" fill="#14532d">4 repos (one per service)</text>

  <!-- ECS -->
  <rect x="600" y="145" width="130" height="60" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="665" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#065f46">ECS Fargate</text>
  <text x="665" y="186" text-anchor="middle" font-size="11" fill="#065f46">ceylonroam-cluster</text>
  <text x="665" y="200" text-anchor="middle" font-size="10" fill="#065f46">4 microservices</text>

  <!-- Vercel -->
  <rect x="210" y="200" width="130" height="60" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="275" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#9d174d">Vercel</text>
  <text x="275" y="241" text-anchor="middle" font-size="11" fill="#9d174d">Frontend (React+Vite)</text>
  <text x="275" y="255" text-anchor="middle" font-size="10" fill="#9d174d">auto-deploy on push</text>

  <!-- ALB -->
  <rect x="600" y="230" width="130" height="60" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="665" y="255" text-anchor="middle" font-size="13" font-weight="600" fill="#075985">AWS ALB</text>
  <text x="665" y="271" text-anchor="middle" font-size="11" fill="#075985">Load Balancer</text>
  <text x="665" y="284" text-anchor="middle" font-size="10" fill="#075985">ports 80/8001/8002/8003</text>

  <!-- Secrets Manager -->
  <rect x="760" y="145" width="120" height="55" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="820" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#9a3412">Secrets</text>
  <text x="820" y="183" text-anchor="middle" font-size="11" fill="#9a3412">Manager</text>
  <text x="820" y="196" text-anchor="middle" font-size="10" fill="#9a3412">credentials</text>

  <!-- CloudWatch -->
  <rect x="760" y="230" width="120" height="55" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="820" y="253" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">CloudWatch</text>
  <text x="820" y="268" text-anchor="middle" font-size="11" fill="#991b1b">Logs</text>
  <text x="820" y="281" text-anchor="middle" font-size="10" fill="#991b1b">/ecs/* log groups</text>

  <!-- Users -->
  <rect x="30" y="200" width="120" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="90" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">Users</text>
  <text x="90" y="241" text-anchor="middle" font-size="11" fill="#334155">Browser / App</text>
  <text x="90" y="255" text-anchor="middle" font-size="10" fill="#334155">HTTPS</text>

  <!-- Arrows Developer → GitHub -->
  <line x1="150" y1="110" x2="208" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GitHub → GitHub Actions -->
  <line x1="330" y1="110" x2="388" y2="110" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- GitHub Actions → ECR -->
  <line x1="540" y1="95" x2="598" y2="83" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="83" font-size="10" fill="#555">build+push</text>

  <!-- GitHub Actions → ECS -->
  <line x1="540" y1="125" x2="598" y2="162" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="548" y="153" font-size="10" fill="#555">deploy</text>

  <!-- ECR → ECS -->
  <line x1="665" y1="120" x2="665" y2="143" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="670" y="137" font-size="10" fill="#555">pull image</text>

  <!-- ECS → ALB -->
  <line x1="665" y1="205" x2="665" y2="228" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Secrets Manager → ECS -->
  <line x1="760" y1="172" x2="731" y2="172" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="735" y="167" font-size="9" fill="#ea580c">inject</text>

  <!-- CloudWatch ↔ ECS -->
  <line x1="760" y1="260" x2="731" y2="190" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="740" y="225" font-size="9" fill="#dc2626">logs</text>

  <!-- Users → Vercel -->
  <line x1="150" y1="230" x2="208" y2="230" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vercel → ALB (rewrites) -->
  <line x1="340" y1="255" x2="598" y2="265" stroke="#db2777" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="430" y="248" font-size="10" fill="#db2777">/api/* rewrites</text>

  <!-- GitHub → Vercel (CI) -->
  <line x1="270" y1="140" x2="270" y2="198" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="200" y="177" font-size="10" fill="#9333ea">auto-deploy</text>

  <!-- Legend -->
  <rect x="30" y="320" width="840" height="175" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="50" y="342" font-size="13" font-weight="700" fill="#1e293b">Microservices deployed to ECS Fargate:</text>

  <rect x="50" y="355" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="70" y="366" font-size="12" fill="#1e293b">auth-service (Node/Express, port 5001/80) – JWT auth, OAuth2, user management</text>

  <rect x="50" y="378" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a"/>
  <text x="70" y="389" font-size="12" fill="#1e293b">itinerary-service (FastAPI, port 8001) – AI-powered travel itinerary generation</text>

  <rect x="50" y="401" width="14" height="14" rx="3" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="70" y="412" font-size="12" fill="#1e293b">route-optimizer-service (FastAPI, port 8002) – Google Maps route optimization</text>

  <rect x="50" y="424" width="14" height="14" rx="3" fill="#fce7f3" stroke="#db2777"/>
  <text x="70" y="435" font-size="12" fill="#1e293b">voice-translation-service (FastAPI, port 8003) – Speech-to-text &amp; translation</text>

  <line x1="50" y1="452" x2="80" y2="452" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="85" y="456" font-size="11" fill="#555">sync deploy path</text>
  <line x1="200" y1="452" x2="230" y2="452" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="235" y="456" font-size="11" fill="#555">async/rewrite path</text>
  <line x1="370" y1="452" x2="400" y2="452" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="405" y="456" font-size="11" fill="#555">secrets injection</text>
  <line x1="520" y1="452" x2="550" y2="452" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="555" y="456" font-size="11" fill="#555">log stream</text>
  <text x="450" y="488" text-anchor="middle" font-size="10" fill="#94a3b8">CeylonRoam Deployment Architecture – AWS ECS Fargate + Vercel</text>
</svg>