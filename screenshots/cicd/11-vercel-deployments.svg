  <rect x="20" y="344" width="780" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="36" y="364" font-size="12" font-weight="600" fill="#00e599">✓  Why Vercel for the frontend?</text>
  <text x="36" y="382" font-size="11" fill="#888">Zero-config deployments on every push to main. Preview deployments for every PR. CDN-based global distribution.</text>
  <text x="36" y="399" font-size="11" fill="#888">vercel.json rewrites proxy /api/* and /voice/* to the ALB, keeping the frontend API surface clean and CORS-free.</text>
