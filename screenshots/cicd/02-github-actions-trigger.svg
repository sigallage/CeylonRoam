  <text x="170" y="312" font-size="13" fill="#8b949e">  # Required for OIDC role assumption</text>

  <!-- Annotation box -->
  <rect x="30" y="358" width="756" height="64" rx="6" fill="#1c2128" stroke="#238636" stroke-width="1.5"/>
  <text x="46" y="377" font-size="12" fill="#3fb950" font-family="Segoe UI, Arial, sans-serif" font-weight="700">✓  Why path filtering?</text>
  <text x="46" y="395" font-size="12" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif">Restricts deploys to backend changes only — a frontend-only commit will NOT trigger a backend deployment,</text>
  <text x="46" y="412" font-size="12" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif">reducing unnecessary Docker builds and AWS API calls. <tspan fill="#f0883e">workflow_dispatch</tspan> allows manual re-runs.</text>
</svg>