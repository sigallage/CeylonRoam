  <circle cx="22" cy="20" r="7" fill="#ff5f57"/>
  <circle cx="42" cy="20" r="7" fill="#febc2e"/>
  <circle cx="62" cy="20" r="7" fill="#28c840"/>
  <text x="410" y="25" text-anchor="middle" font-size="13" fill="#8b949e" font-family="Segoe UI, Arial, sans-serif">.github/workflows/deploy-backend-ecs.yml — Trigger Configuration</text>

  <!-- Line numbers + code -->
  <!-- Line 1 -->
  <text x="18" y="72" font-size="13" fill="#6e7681">1</text>
  <text x="40" y="72" font-size="13" fill="#79c0ff">name</text><text x="90" y="72" font-size="13" fill="#e6edf3">:</text>
  <text x="100" y="72" font-size="13" fill="#a5d6ff"> Deploy Backend (ECS)</text>

  <text x="18" y="92" font-size="13" fill="#6e7681">2</text>

  <text x="18" y="112" font-size="13" fill="#6e7681">3</text>
  <text x="40" y="112" font-size="13" fill="#79c0ff">on</text><text x="60" y="112" font-size="13" fill="#e6edf3">:</text>

  <!-- Highlight block -->
  <rect x="34" y="118" width="752" height="82" rx="4" fill="#1f2a38"/>

  <text x="18" y="132" font-size="13" fill="#6e7681">4</text>
  <text x="52" y="132" font-size="13" fill="#79c0ff">  push</text><text x="102" y="132" font-size="13" fill="#e6edf3">:</text>

  <text x="18" y="152" font-size="13" fill="#6e7681">5</text>
  <text x="52" y="152" font-size="13" fill="#79c0ff">    branches</text><text x="135" y="152" font-size="13" fill="#e6edf3">: [</text>
  <text x="160" y="152" font-size="13" fill="#a5d6ff">main</text>
  <text x="196" y="152" font-size="13" fill="#e6edf3">]</text>

  <text x="18" y="172" font-size="13" fill="#6e7681">6</text>
  <text x="52" y="172" font-size="13" fill="#79c0ff">    paths</text><text x="104" y="172" font-size="13" fill="#e6edf3">:</text>

  <text x="18" y="192" font-size="13" fill="#6e7681">7</text>
  <text x="52" y="192" font-size="13" fill="#a5d6ff">      - &#39;backend/**&#39;</text>

  <text x="18" y="212" font-size="13" fill="#6e7681">8</text>
  <text x="52" y="212" font-size="13" fill="#a5d6ff">      - &#39;.github/workflows/deploy-backend-ecs.yml&#39;</text>

  <text x="18" y="232" font-size="13" fill="#6e7681">9</text>
  <text x="52" y="232" font-size="13" fill="#79c0ff">  workflow_dispatch</text><text x="200" y="232" font-size="13" fill="#e6edf3">:</text>

  <text x="18" y="252" font-size="13" fill="#6e7681">10</text>

  <text x="18" y="272" font-size="13" fill="#6e7681">11</text>
  <text x="40" y="272" font-size="13" fill="#79c0ff">permissions</text><text x="138" y="272" font-size="13" fill="#e6edf3">:</text>

  <text x="18" y="292" font-size="13" fill="#6e7681">12</text>
  <text x="52" y="292" font-size="13" fill="#79c0ff">  contents</text><text x="118" y="292" font-size="13" fill="#e6edf3">: </text>
  <text x="130" y="292" font-size="13" fill="#a5d6ff">read</text>

  <text x="18" y="312" font-size="13" fill="#6e7681">13</text>
  <text x="52" y="312" font-size="13" fill="#79c0ff">  id-token</text><text x="114" y="312" font-size="13" fill="#e6edf3">: </text>
